<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>準提神咒 精進修持助手</title>
    <style>
        :root { --primary-color: #b8860b; --primary-light: #faf6f0; --bg-color: #f5efe6; --text-color: #3d2514; --accent-color: #d9534f; --gold-glow: #fff7e6; }
        body { font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; line-height: 1.6; }
        .container { max-width: 600px; width: 100%; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: 1px solid #e6dfd3; box-sizing: border-box; }
        h1 { text-align: center; color: var(--primary-color); margin-bottom: 20px; font-size: 24px; letter-spacing: 2px; }
        .section { margin-bottom: 20px; padding: 18px; background: var(--primary-light); border-radius: 10px; border-left: 4px solid var(--primary-color); position: relative; }
        .section-title { font-weight: bold; color: var(--primary-color); margin-bottom: 12px; font-size: 16px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .gatha-text { text-align: center; font-size: 18px; font-weight: 600; margin: 8px 0; }
        .mantra-block { text-align: center; margin: 12px 0; padding-bottom: 10px; border-bottom: 1px dashed #e6dfd3; }
        .mantra-chinese { font-size: 20px; font-weight: bold; color: #222; margin-top: 2px; }
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .input-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 13px; color: #555; }
        select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; }
        .btn-record { background-color: var(--accent-color); color: white; width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-test-audio { background-color: #6c757d; color: white; width: 100%; margin-top: 8px; padding: 8px; border-radius: 5px; border: none; cursor: pointer; }
        .btn-start { background-color: var(--primary-color); color: white; padding: 12px; border: none; border-radius: 5px; flex: 1; font-weight: bold; }
        .btn-stop { background-color: #555; color: white; padding: 12px; border: none; border-radius: 5px; flex: 1; font-weight: bold; }
        .btn-manual-count { background: linear-gradient(135deg, #e6b800, #b8860b); color: white; width: 100%; padding: 15px; border: none; border-radius: 5px; font-size: 18px; font-weight: bold; margin-bottom: 15px; }
        .counter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: center; }
        .counter-box { background: var(--primary-light); padding: 10px; border-radius: 8px; border: 1px solid #ebdcb9; }
        .counter-box.total { background: var(--gold-glow); border: 1px solid #ccad00; }
        .counter-num { font-size: 30px; font-weight: bold; color: var(--primary-color); }
        .edit-count-btn { font-size: 12px; cursor: pointer; color: #b8860b; text-decoration: underline; background: none; border: none; }
        .progress-container { margin-top: 10px; background: #eee; border-radius: 10px; height: 16px; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, #ccad00, #b8860b); height: 100%; width: 0%; transition: width 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <h1>📿 準提神咒 精進修持助手</h1>
    <audio id="nativeAudio" playsinline style="display: none;"></audio>

    <div class="section" style="background: #fff5f5; border-left-color: var(--accent-color);">
        <div class="section-title" style="color: var(--accent-color);">🎙️ 準備工作：現場法音錄製</div>
        <button id="recordBtn" class="btn-record">🔴 開始錄製準提咒</button>
        <button class="btn-test-audio" onclick="testSavedAudio()">▶️ 立即測試錄音</button>
        <div id="recordStatus" style="font-size:12px; text-align:center; color:#777; margin-top:5px;">尚未錄音</div>
    </div>

    <div class="section">
        <div class="section-title" onclick="playChimeSound()">① 開咒偈 (點擊鳴磬)</div>
        <div class="gatha-text">稽首皈依蘇悉帝，頭面頂禮七俱胝，我今稱讚大準提，惟願慈悲垂加護。</div>
        <button onclick="playChimeSound()" style="width:100%; padding:8px;">🔔 鳴磬一聲 (準備持誦)</button>
    </div>

    <div class="section">
        <div class="section-title">② 準提咒文</div>
        <div class="mantra-block">
            <div class="mantra-chinese">南無 颯哆喃 三藐三勃陀 俱胝喃 怛姪他</div>
            <div class="mantra-chinese">唵 折隸 主隸 準提 娑婆訶</div>
        </div>
    </div>

    <button class="btn-manual-count" id="manualCountBtn">✨ 手動點擊持誦 (+1)</button>

    <div class="section">
        <div class="section-title" style="color: #ccad00;">📊 功德累計</div>
        <div class="counter-grid">
            <div class="counter-box">
                <div class="counter-label">本次計數</div>
                <div class="counter-num" id="currentCount">0</div>
            </div>
            <div class="counter-box total">
                <div class="counter-label">🌟 總累積 🌟 <button class="edit-count-btn" onclick="editTotalCount()">[修改]</button></div>
                <div class="counter-num" id="totalCount">0</div>
            </div>
        </div>
        <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
        <div id="milestoneTargetLabel" style="font-size:12px; margin-top:5px; text-align:center; font-weight:bold;">目標：10 萬遍</div>
    </div>
</div>

<script>
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const nativeAudio = document.getElementById('nativeAudio');
    const totalCountDisplay = document.getElementById('totalCount');
    const progressBar = document.getElementById('progressBar');
    const milestoneTargetLabel = document.getElementById('milestoneTargetLabel');
    let count = 0;

    function playChimeSound() {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(880, now);
        gain.gain.setValueAtTime(0.5, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 2);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(); osc.stop(now + 2);
    }

    function testSavedAudio() {
        if (nativeAudio.src) nativeAudio.play();
        else alert("尚未錄製聲音。");
    }

    function editTotalCount() {
        const current = localStorage.getItem('zhunti_total_count') || '0';
        const newCount = prompt("請輸入您目前已累積的總次數：", current);
        if (newCount !== null && !isNaN(newCount)) {
            localStorage.setItem('zhunti_total_count', newCount);
            renderTotalStats();
        }
    }

    function renderTotalStats() {
        const total = parseInt(localStorage.getItem('zhunti_total_count') || '0');
        totalCountDisplay.textContent = total.toLocaleString();
        
        let target = 100000;
        if (total >= 1000000) target = 5000000;
        else if (total >= 500000) target = 1000000;
        else if (total >= 300000) target = 500000;
        else if (total >= 200000) target = 300000;
        else if (total >= 100000) target = 200000;

        milestoneTargetLabel.textContent = `下一階段目標：${target.toLocaleString()} 遍`;
        progressBar.style.width = `${Math.min((total / target) * 100, 100)}%`;
    }

    document.getElementById('manualCountBtn').addEventListener('click', () => {
        playChimeSound();
        count++;
        document.getElementById('currentCount').textContent = count;
        let total = parseInt(localStorage.getItem('zhunti_total_count') || '0') + 1;
        localStorage.setItem('zhunti_total_count', total);
        renderTotalStats();
    });

    // 初始化
    renderTotalStats();
    const savedAudio = localStorage.getItem('zhunti_saved_audio');
    if (savedAudio) nativeAudio.src = savedAudio;
</script>
</body>
</html>
